services:
  gateway-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: gateway_nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:80"
    volumes:
      - ./docker/gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-nginx
      - blog-nginx
      - admin-nginx
      - web-nginx
    networks:
      - blog_network

  web-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: web_nginx
    restart: unless-stopped
    volumes:
      - ./services/web:/var/www/html
      - ./docker/nginx/web/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-php-fpm
    networks:
      - blog_network

  web-php-fpm:
    build:
      context: ./docker/php-fpm
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: web_php_fpm
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./services/web:/var/www/html
    networks:
      - blog_network

  auth-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: auth_nginx
    restart: unless-stopped
    volumes:
      - ./services/auth:/var/www/html
      - ./docker/nginx/auth/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-php-fpm
    networks:
      - blog_network

  auth-php-fpm:
    build:
      context: ./docker/php-fpm
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: auth_php_fpm
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./services/auth:/var/www/html
    networks:
      - blog_network

  blog-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: blog_nginx
    restart: unless-stopped
    volumes:
      - ./services/blog:/var/www/html
      - ./docker/nginx/blog/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - blog-php-fpm
    networks:
      - blog_network

  blog-php-fpm:
    build:
      context: ./docker/php-fpm
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: blog_php_fpm
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./services/blog:/var/www/html
    networks:
      - blog_network

  admin-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: admin_nginx
    restart: unless-stopped
    volumes:
      - ./services/admin:/var/www/html
      - ./docker/nginx/admin/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-php-fpm
    networks:
      - blog_network

  admin-php-fpm:
    build:
      context: ./docker/php-fpm
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: admin_php_fpm
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./services/admin:/var/www/html
    networks:
      - blog_network

  mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: blog_mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blog}
      MYSQL_USER: ${MYSQL_USER:-blog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - blog_network

  auth-mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: auth_mysql
    restart: unless-stopped
    ports:
      - "${AUTH_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${AUTH_MYSQL_DATABASE:-auth}
      MYSQL_USER: ${AUTH_MYSQL_USER:-auth}
      MYSQL_PASSWORD: ${AUTH_MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - auth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - blog_network

  admin-mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: admin_mysql
    restart: unless-stopped
    ports:
      - "${ADMIN_MYSQL_PORT:-3308}:3306"
    environment:
      MYSQL_DATABASE: ${ADMIN_MYSQL_DATABASE:-admin}
      MYSQL_USER: ${ADMIN_MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${ADMIN_MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${ADMIN_MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - admin_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - blog_network

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-3-management}
    container_name: blog_rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-blog}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-secret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-blog}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - blog_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: blog_elasticsearch
    restart: unless-stopped
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - blog_network

volumes:
  mysql_data:
  auth_mysql_data:
  admin_mysql_data:
  rabbitmq_data:
  elasticsearch_data:

networks:
  blog_network:
    driver: bridge
